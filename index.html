<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <title>3-CSHB DEMO</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="timer" id="timer">01:20:00</div>

      <div class="main">
        <div class="question-area">
          <h2 id="questionText"></h2>
          <br />
          <h3 id="englishAnswers"></h3>
          <hr />
          <img id="questionImage" class="question-img" />

          <div class="answers">
            <label class="option">
              <input type="radio" name="answer" value="0" />
              <span></span>
              A
            </label>

            <label class="option">
              <input type="radio" name="answer" value="1" />
              <span></span>
              B
            </label>

            <label class="option">
              <input type="radio" name="answer" value="2" />
              <span></span>
              C
            </label>

            <label class="option">
              <input type="radio" name="answer" value="3" />
              <span></span>
              D
            </label>
          </div>
        </div>

        <div class="sidebar">
          <div class="question-grid" id="questionGrid"></div>

          <button class="finish-btn" onclick="finishTest()">
            Testni yakunlash
          </button>
        </div>
      </div>
    </div>

    <div id="resultModal" class="modal">
      <div class="modal-content">
        <h2>Test Natijasi</h2>

        <div class="charts">
          <div class="chartBox">
            <canvas id="mathChart"></canvas>
            <p id="mathResult"></p>
          </div>

          <div class="chartBox">
            <canvas id="engChart"></canvas>
            <p id="engResult"></p>
          </div>
        </div>

        <div class="modal-buttons">
          <button onclick="restartTest()" class="restart">
            Qayta boshlash
          </button>

          <button onclick="exitTest()" class="exit">Testdan chiqish</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
